<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Presence</title>

    <!-- Install as a phone app (Add to Home Screen) -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Presence" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section id="stage" aria-label="The presence">
        <canvas id="orb"></canvas>
        <p id="note" aria-live="polite"></p>
      </section>

      <div id="stage-grip" role="button" tabindex="0"
           aria-label="Drag or tap to show or hide the presence"
           title="Drag up to hide the presence · drag down or tap to show"></div>

      <section id="conversation">
        <div id="log" aria-live="polite"></div>
        <form id="composer">
          <button id="third-thing" type="button" aria-label="A quiet memory" title="The Third Thing">✧</button>
          <div id="drawer" tabindex="0" role="button" aria-label="Drop a thought" title="Drop a thought — image, sound, or text"></div>
          <input type="file" id="drawer-file" accept="image/*,audio/*,text/plain" hidden />
          <textarea
            id="input"
            rows="1"
            placeholder="Say something…"
            autocomplete="off"
          ></textarea>
          <button id="send" type="submit" aria-label="Send">→</button>
        </form>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
